- name: OS Installation details
  debug:
      msg: >
        Installing docker for {{ansible_facts["os_family"]}}
        / {{ansible_facts["distribution"]}}
        / {{ansible_facts["distribution_release"]}}
        / {{ansible_facts["distribution_version"]}}

- name: Clean duplicate Docker apt source files
  ansible.builtin.include_tasks:
    file: cleanup_apt_sources.yml

- name: Install docker-ce
  include_tasks:
    file: install_{{ ansible_facts['os_family'] | lower }}.yml

- name: Install uidmap for user namespace support
  become: true
  ansible.builtin.apt:
    name: uidmap
    state: present
  when: docker_userns_remap != false and ansible_facts['os_family'] == "Debian"

- name: Configure subuid for userns-remap user
  become: true
  ansible.builtin.lineinfile:
    path: /etc/subuid
    line: "{{ docker_userns_remap }}:100000:65536"
    create: true
    mode: '0644'
  when: docker_userns_remap != false and docker_userns_remap != "default"

- name: Configure subgid for userns-remap user
  become: true
  ansible.builtin.lineinfile:
    path: /etc/subgid
    line: "{{ docker_userns_remap }}:100000:65536"
    create: true
    mode: '0644'
  when: docker_userns_remap != false and docker_userns_remap != "default"

- name: Check if nftables is present
  tags: dockerupdate
  ansible.builtin.stat:
    path: /usr/sbin/nft
  register: _nft_binary

- name: Write daemon.json
  tags: dockerupdate
  vars:
    _userns_config: "{{ {'userns-remap': docker_userns_remap} if docker_userns_remap else {} }}"
    _nftables_config: "{{ {'firewall-backend': 'nftables'} if (_nft_binary.stat.exists | default(false)) else {} }}"
  ansible.builtin.copy:
    content: "{{ docker_daemon_config | combine(_userns_config) | combine(_nftables_config) | to_nice_json }}\n"
    dest: /etc/docker/daemon.json
    owner: "root"
    group: "root"
    mode: '644'
  become: true

- name: Create docker project directory
  ansible.builtin.file:
    path: "{{ docker_project_root }}"
    state: directory
    mode: '0700'
    owner: "{{docker_user}}"
    group: "{{docker_user}}"
  become: true

- name: Make sure docker_user in docker group
  user:
    name: '{{docker_user}}'
    groups: docker
    append: yes
  become: true

- name: Create docker project item directories
  tags: dockerupdate
  ansible.builtin.file:
    path: "{{ docker_project_root }}/{{ item }}"
    state: directory
    mode: '0700'
    owner: "{{docker_user}}"
    group: "{{docker_user}}"
  become: true
  loop: "{{ docker_containers }}"

- name: Copy recreate container
  tags: dockerupdate
  ansible.builtin.template:
    src: "recreate_container.j2"
    dest: "{{docker_project_root}}/recreate_container"
    owner: "{{docker_user}}"
    group: "{{docker_user}}"
    mode: '700'
  become: true

- name: Copy templated dockerfiles
  tags: dockerupdate
  ansible.builtin.template:
    src: "{{ item }}.yml.j2"
    dest: "{{ docker_project_root }}/{{ item }}/docker-compose.yml"
    owner: "{{docker_user}}"
    group: "{{docker_user}}"
    mode: '600'
  become: true
  loop: "{{ docker_containers }}"

# Allows for merging of containers into a single stack if xxx_merge_containers
# is set. Make sure yyy_merge_containers is null for all dependant containers.
- name: Copy templated stack file
  tags: dockerupdate
  ansible.builtin.template:
    src: "stack.j2"
    dest: "{{ docker_project_root }}/{{ item }}/stack"
    owner: "{{docker_user}}"
    group: "{{docker_user}}"
    mode: '755'
  vars:
    docker_merge_containers: "{{ lookup('vars', item + '_merge_containers', default=[item]) }}"
  become: true
  loop: "{{ docker_containers }}"

- name: Write start everything file, ansible does not start the containers as that would not be idempotent
  tags: dockerupdate
  ansible.builtin.template:
    src: "recreate_all_containers.j2"
    dest: "{{docker_project_root}}/recreate_all_containers"
    owner: "{{docker_user}}"
    group: "{{docker_user}}"
    mode: '700'
  become: true

- name: Run any per-container task sets
  tags:
    - dockerupdate
    - dockersubtasks
  block:
  - include_tasks:
      file: "{{item}}_tasks.yml"
    when: lookup('vars', 'docker_' + item + '_tasks', default=false)
    loop: "{{ docker_containers }}"
